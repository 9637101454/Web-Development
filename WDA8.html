<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script>
        function calculate(){
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let operator = document.getElementById("operator").value;
            let result;

            switch (operator) {
                case "+":
                    result = num1 + num2;
                    break;

                case "-":
                    result = num1 - num2;
                    break;

                case "*":
                    result = num1 * num2;
                    break;

                case "/":
                    if(num2 == 0) {
                        result = "Division bt zero not allowed";
                    }else{
                        result = num1 / num2;
                    }
                    break;

                case "%":
                    if(num2 == 0){
                        result = "Division by zero not allowed";
                    }else{
                        result = num1 % num2;
                    }
                    break;

                case "**":
                    result = "Square= "+num1*num1;
                    break;

                case "***":
                    result = "Cube= " +num1*num1*num1+","+num2*num2*num2;
                    break;

                default:
                    result = "Invalid operator";
            }
            document.getElementById("result").innerHTML = "Result:" + result;
        }
    </script>
</head>
<body>
    
    <h2>Simple Calculator</h2>

    <label>Enter First Number: </label>
    <input type="number" id="num1"><br><br>

    <label>Enter Second Number: </label>
    <input type="number" id="num2"><br><br>

    <label> Select Operator: </label>
    <select id="operator">
        <option value="+">Addition(+)</option>
        <option value="-">Subtraction(-)</option>
        <option value="*">Multiplication(*)</option>
        <option value="/">Division(/)</option>
        <option value="%">Modulus(%)</option>
        <option value="**">Square(**)</option>
        <option value="***">Cube(***)</option>
    </select><br><br>

    <button onclick="calculate()">Calculator</button>
    <p id="result"></p>
</body>
</html>
